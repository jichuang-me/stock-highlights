<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Highlights - Financial Intel</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100vh;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(34, 211, 238, 0.12), transparent 30%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
        font-family:
          Inter, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      }

      .app-loading-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #cbd5e1;
        padding: 24px;
      }

      .app-loading-content {
        text-align: center;
      }

      .app-loading-title {
        margin-bottom: 12px;
        font-size: 28px;
        font-weight: 600;
        color: #f8fafc;
      }

      .app-loading-subtitle {
        font-size: 14px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="root" class="app-loading-container">
      <div class="app-loading-content">
        <div class="app-loading-title">金融智能终端加载中...</div>
        <div class="app-loading-subtitle">正在连接 AI 智策引擎</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
